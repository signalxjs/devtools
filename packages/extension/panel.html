<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SignalX DevTools</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #fff;
            --fg: #222;
            --muted: #888;
            --line: #e5e5e5;
            --accent: #4f46e5;
            --row-hover: #f5f5f5;
            --row-active: #e0e7ff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e1e;
                --fg: #e0e0e0;
                --muted: #888;
                --line: #333;
                --accent: #818cf8;
                --row-hover: #2a2a2a;
                --row-active: #312e81;
            }
        }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            background: var(--bg);
            color: var(--fg);
            font: 12px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        }
        #root { height: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/panel/panel.tsx"></script>
</body>
</html>
