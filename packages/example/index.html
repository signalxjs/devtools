<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SigX DevTools Example</title>
        <style>
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                margin: 0;
                padding: 2rem;
                background: #fafafa;
                color: #222;
            }
            main { max-width: 540px; margin: 0 auto; }
            h1 { margin-top: 0; }
            button {
                padding: 0.4rem 0.9rem;
                font-size: 1rem;
                border: 1px solid #ccc;
                background: white;
                border-radius: 6px;
                cursor: pointer;
            }
            button + button { margin-left: 0.5rem; }
            .row { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
